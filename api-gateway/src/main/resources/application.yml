server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

          routes:
            - id: user-service-route
              uri: lb://USER-SERVICE
              predicates:
                - Path=/user-service/**,/api/users/**
              filters:
                - RewritePath=/user-service/(?<segment>.*), /$\{segment}

            - id: wallet-service-route
              uri: lb://WALLET-SERVICE
              predicates:
                - Path=/wallet-service/**,/api/wallets/**
              filters:
                - RewritePath=/wallet-service/(?<segment>.*), /$\{segment}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true

logging:
  level:
    org.springframework.cloud.gateway: TRACE
    org.springframework.web.reactive: DEBUG
